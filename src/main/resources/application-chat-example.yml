# =====================================================================
# 채팅 상담(RAG + OpenAI) 기능 전용 설정 예시 파일.
# 운영 환경에서는 application.yml 또는 환경 변수로 옮겨 관리한다.
# 절대로 실제 API Key 를 이 파일에 그대로 커밋하지 말 것.
#   - 로컬: ${OPENAI_API_KEY} 환경 변수 사용
#   - 운영: AWS SSM / Vault 등 시크릿 매니저에서 주입
# =====================================================================
openai:
  api:
    # 환경 변수 OPENAI_API_KEY 가 없으면 빈 값으로 주입되어 시작 시 검증 단계에서 실패시킨다.
    key: ${OPENAI_API_KEY:}
    url: https://api.openai.com/v1/chat/completions
  model: gpt-4o-mini
  # OpenAI 호출 타임아웃(ms)
  timeout-ms: 15000
  # System 프롬프트의 기본 페르소나(검색된 컨텍스트가 없을 때도 사용)
  system-persona: |
    당신은 삼육대학교 커리큘럼 상담 전문 AI 도우미입니다.
    답변은 한국어로 친절하고 정확하게, 근거가 부족할 경우 모른다고 답합니다.
